<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zime ROI | Intelligence Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(15, 15, 18, 0.6);
            --card-border: rgba(255, 174, 0, 0.2);
            --accent-gold: #ffae00;
            --accent-silver: #e0e0e0;
            --text-high: #ffffff;
            --text-low: #888888;
            --success: #00ff88;
            --danger: #ff3333;
            --neutral: #0077ff;
            --glass-blur: blur(30px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-high);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 174, 0, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 174, 0, 0.03) 0%, transparent 40%);
        }

        .container {
            width: 95%;
            max-width: 1200px;
            padding: 20px;
        }

        /* HEADER (POSITION ORIGINAL) */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 60px;
            position: relative;
            padding: 10px 0;
        }

        .logo-box {
            width: 150px;
            flex-shrink: 0;
        }

        .logo-img {
            max-width: 120px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 174, 0, 0.2));
        }

        .app-title-box {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .app-name {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: -5px;
        }

        .app-subtitle {
            font-size: 0.75rem;
            font-weight: 200;
            color: var(--accent-silver);
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .spacer {
            width: 150px;
        }

        /* GRID (POSITION ORIGINAL 380px 1fr) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        @media (max-width: 950px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .app-title-box { position: static; transform: none; margin: 20px 0; }
            header { flex-direction: column; text-align: center; }
        }

        /* CARDS */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .input-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 12px;
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 400;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-gold);
            background: rgba(255, 174, 0, 0.05);
        }

        /* RESULTS (ORIGINAL) */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .result-item {
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            text-align: center;
        }

        .item-label {
            font-size: 0.7rem;
            color: var(--text-low);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .item-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-high);
        }

        .lucro-card {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(255, 174, 0, 0.1) 0%, transparent 100%);
            border: 1px solid rgba(255, 174, 0, 0.3);
        }

        .lucro-card .item-value {
            font-size: 3rem;
            text-shadow: 0 10px 30px rgba(255, 174, 0, 0.3);
        }

        /* STATUS BOX */
        .status-box {
            grid-column: span 2;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            border-left: 5px solid var(--accent-gold);
            margin-top: 10px;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .badge-pos { background: rgba(0, 255, 136, 0.2); color: var(--success); }
        .badge-neg { background: rgba(255, 51, 51, 0.2); color: var(--danger); }

        /* FOOTER (BRANDING FINAL) */
        footer {
            margin-top: 80px;
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid rgba(255, 174, 0, 0.1);
        }

        .slogan {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .attribution {
            font-size: 0.75rem;
            color: var(--text-low);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            display: block;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            background: rgba(255, 174, 0, 0.05);
            border: 1px solid rgba(255, 174, 0, 0.2);
            border-radius: 50px;
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 174, 0, 0.3);
            transform: translateY(-3px);
        }

        .social-icon { width: 18px; height: 18px; fill: currentColor; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-box">
            <img src="logo.png" alt="ZIME" class="logo-img" onerror="this.src='logo.svg'; this.onerror=function(){this.src='https://via.placeholder.com/150/000000/ffae00?text=Z'; this.style.borderRadius='10px'}">
        </div>
        
        <div class="app-title-box">
            <div class="app-name">Zime ROI</div>
            <div class="app-subtitle">Intelligence Analytics</div>
        </div>

        <div class="spacer"></div>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <div class="input-group">
                <label>Investimento Ads</label>
                <input type="number" id="spend" value="0" step="0.01">
            </div>
            <div class="input-group">
                <label>Ticket do Produto</label>
                <input type="number" id="ticket" value="0" step="0.01">
            </div>
            <div class="input-group">
                <label>Número de Vendas</label>
                <input type="number" id="sales" value="0">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label style="opacity: 0.5;">Faturamento (Opcional)</label>
                <input type="number" id="manual_revenue" placeholder="Cálculo automático">
            </div>
        </div>

        <div class="card results-grid">
            <div class="result-item lucro-card">
                <p class="item-label">Lucro Líquido Real</p>
                <div id="lucro-value" class="item-value">R$ 0</div>
            </div>

            <div class="result-item">
                <p class="item-label">Faturamento Total</p>
                <div id="revenue-value" class="item-value">R$ 0</div>
            </div>

            <div class="result-item">
                <p class="item-label">ROI (Retorno %)</p>
                <div id="roi-value" class="item-value">0%</div>
            </div>

            <div class="result-item">
                <p class="item-label">CPA Médio</p>
                <div id="cpa-value" class="item-value">R$ 0</div>
            </div>

            <div class="result-item">
                <p class="item-label">ROAS</p>
                <div id="roas-value" class="item-value">0.0x</div>
            </div>

            <div class="status-box">
                <div class="status-header">
                    <div class="status-title">ANÁLISE DE PERFORMANCE</div>
                    <span id="status-badge" class="badge">AGUARDANDO</span>
                </div>
                <p id="status-text" class="status-text">Insira os dados acima para iniciar a análise.</p>
            </div>
        </div>
    </div>

    <footer>
        <h3 class="slogan">Dominando a Ciência da Escala de Elite</h3>
        <span class="attribution">by Felipe Dazzi</span>
        <div class="social-links">
            <a href="https://www.instagram.com/felipe.dazzi/" target="_blank" class="social-btn">
                <svg class="social-icon" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.162 6.162 6.162 6.162-2.759 6.162-6.162-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                Instagram
            </a>
            <a href="https://www.youtube.com/@ofelipedazzi" target="_blank" class="social-btn">
                <svg class="social-icon" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                YouTube
            </a>
        </div>
    </footer>
</div>

<script>
    const inputs = ['spend', 'ticket', 'sales', 'manual_revenue'];
    const el = {
        spend: document.getElementById('spend'),
        ticket: document.getElementById('ticket'),
        sales: document.getElementById('sales'),
        manual: document.getElementById('manual_revenue'),
        lucro: document.getElementById('lucro-value'),
        revenue: document.getElementById('revenue-value'),
        roi: document.getElementById('roi-value'),
        cpa: document.getElementById('cpa-value'),
        roas: document.getElementById('roas-value'),
        badge: document.getElementById('status-badge'),
        text: document.getElementById('status-text')
    };

    function calculate() {
        const spend = parseFloat(el.spend.value) || 0;
        const ticket = parseFloat(el.ticket.value) || 0;
        const sales = parseFloat(el.sales.value) || 0;
        const manual = parseFloat(el.manual.value);

        let revenue = sales * ticket;
        if (!isNaN(manual)) { revenue = manual; } 
        else { el.manual.placeholder = "Auto: R$ " + (sales * ticket).toLocaleString(); }

        const lucro = revenue - spend;
        const roi = spend > 0 ? ((revenue - spend) / spend) * 100 : 0;
        const roas = spend > 0 ? revenue / spend : 0;
        const cpa = sales > 0 ? spend / sales : 0;

        el.revenue.innerText = 'R$ ' + revenue.toLocaleString('pt-BR', { minimumFractionDigits: 0 });
        el.lucro.innerText = 'R$ ' + lucro.toLocaleString('pt-BR', { minimumFractionDigits: 0 });
        el.roi.innerText = (roi > 0 ? '+' : '') + roi.toFixed(0) + '%';
        el.roas.innerText = roas.toFixed(2) + 'x';
        el.cpa.innerText = 'R$ ' + cpa.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

        // Cores Condicionais do Lucro (Pequeno ajuste para azul no zero)
        if (lucro < 0) {
            el.lucro.style.color = '#ff3333'; // Vermelho
        } else if (lucro === 0) {
            el.lucro.style.color = '#0077ff'; // Azul
        } else {
            el.lucro.style.color = '#00ff88'; // Verde
        }

        analyze(roi, lucro, spend, sales);
    }

    function analyze(roi, lucro, spend, sales) {
        let msg = "";
        let badge = "SAUDÁVEL";
        let color = "badge-pos";

        if (spend === 0 && sales === 0) {
            msg = "Insira os dados acima para iniciar a análise.";
            badge = "AGUARDANDO";
            color = "";
        } else if (lucro < 0) {
            badge = "CRÍTICO"; color = "badge-neg";
            msg = "Operação no prejuízo. Revise criativos e margens imediatamente.";
        } else if (roi < 100) {
            badge = "ALERTA"; color = "badge-neg";
            msg = "Lucratividade baixa. Otimize a oferta ou o custo de aquisição.";
        } else if (roi < 300) {
            badge = "EXCELENTE"; color = "badge-pos";
            msg = "Modelo validado. Pode considerar escala gradual.";
        } else {
            badge = "ESCALÁVEL 🚀"; color = "badge-pos";
            msg = "Alta performance! Sinal verde para escala agressiva.";
        }

        el.badge.innerText = badge;
        el.badge.className = "badge " + color;
        el.text.innerText = msg;
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
    calculate();
</script>

</body>
</html>
